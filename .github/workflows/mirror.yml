# .github/workflows/mirror.yml
name: Mirror to Internal GitHub

on:
  push:
    branches: ['**']
  delete:  # catches branch/tag deletions

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history

      - name: Push to internal mirror
        env:
          SSH_KEY: ${{ secrets.INTERNAL_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.sie.sony.com >> ~/.ssh/known_hosts
    
          # Test SSH connection first
          ssh -T git@github.sie.sony.com -i ~/.ssh/id_ed25519 || true
    
          git remote add internal git@github.sie.sony.com:msherry/mirrortest.git
          git push internal --mirror
